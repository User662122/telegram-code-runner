name: Telegram Runner

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram chat ID to monitor and reply to'
        required: true
        type: string

jobs:
  run:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Interactive Telegram session
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id }}
        run: |
          $token  = $env:TELEGRAM_BOT_TOKEN
          $chatId = $env:CHAT_ID
          $apiBase = "https://api.telegram.org/bot$token"

          # Build emoji strings from Unicode code points to avoid encoding issues
          $E_OK   = [char]0x2705                       # checkmark box
          $E_WAIT = [char]0x23F3                       # hourglass
          $E_ERR  = [char]0x274C                       # red X
          $E_STOP = [char]::ConvertFromUtf32(0x1F6D1)  # stop sign
          $E_ARR  = [char]0x2192                       # right arrow
          $E_ELL  = [char]0x2026                       # ellipsis

          function Send-Msg($text) {
            $body  = @{ chat_id = $chatId; text = $text; parse_mode = "HTML" } | ConvertTo-Json -Depth 3
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
            try {
              Invoke-WebRequest -Uri "$apiBase/sendMessage" -Method POST `
                -ContentType "application/json; charset=utf-8" `
                -Body $bytes -UseBasicParsing | Out-Null
            } catch {}
          }

          function Html-Escape($s) {
            return $s -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;'
          }

          # Delete webhook so getUpdates works
          Invoke-WebRequest -Uri "$apiBase/deleteWebhook" -Method POST -UseBasicParsing | Out-Null
          Start-Sleep -Seconds 2

          # Fast-forward offset to skip any already-queued messages
          $resp    = Invoke-WebRequest -Uri "$apiBase/getUpdates?limit=100&offset=-1" -UseBasicParsing
          $updates = ($resp.Content | ConvertFrom-Json).result
          $offset  = if ($updates.Count -gt 0) { $updates[-1].update_id + 1 } else { 0 }

          $runId = $env:GITHUB_RUN_ID
          Send-Msg ("$E_OK <b>Windows VM ready</b> (run #$runId)`n`n" +
                    "Send any text $E_ARR runs as <b>PowerShell</b>`n" +
                    "Prefix with <code>/</code> $E_ARR runs in <b>CMD</b>`n" +
                    "Send <code>/stop</code> $E_ARR end session")

          # Main polling loop
          while ($true) {
            try {
              $pollUrl = "$apiBase/getUpdates?offset=$offset&timeout=30&allowed_updates=%5B%22message%22%5D"
              $resp    = Invoke-WebRequest -Uri $pollUrl -UseBasicParsing -TimeoutSec 45
              $result  = ($resp.Content | ConvertFrom-Json)

              foreach ($update in $result.result) {
                $offset = $update.update_id + 1
                $msg    = $update.message
                if (-not $msg -or -not $msg.text) { continue }
                if ([string]$msg.chat.id -ne $chatId) { continue }

                $text = $msg.text.Trim()

                if ($text -eq '/stop') {
                  Send-Msg "$E_STOP Session ended."
                  exit 0
                }

                $isShell = $text.StartsWith('/')
                $content = if ($isShell) { ($text.Substring(1) -replace '@\w+', '').Trim() } else { $text }
                $label   = if ($isShell) { 'CMD' } else { 'PowerShell' }

                if ([string]::IsNullOrWhiteSpace($content)) {
                  Send-Msg "Please provide a command after /"
                  continue
                }

                Send-Msg "$E_WAIT Running [$label]$E_ELL"

                try {
                  if ($isShell) {
                    Set-Content -Path .\run.bat -Value $content -Encoding ASCII
                    $output = (cmd /c .\run.bat 2>&1) | Out-String
                  } else {
                    Set-Content -Path .\run.ps1 -Value $content -Encoding UTF8
                    $output = (& powershell.exe -ExecutionPolicy Bypass -File .\run.ps1 2>&1) | Out-String
                  }

                  $trimmed   = $output.TrimEnd()
                  $maxLen    = 3500
                  $truncated = if ($trimmed.Length -gt $maxLen) { $trimmed.Substring(0, $maxLen) + "`n$E_ELL[output truncated]" } else { $trimmed }
                  $escaped   = Html-Escape $truncated
                  if ([string]::IsNullOrWhiteSpace($escaped)) { $escaped = "(no output)" }

                  Send-Msg "$E_OK [$label]`n<pre>$escaped</pre>"

                } catch {
                  $errText = Html-Escape $_.Exception.Message
                  Send-Msg "$E_ERR [$label] Error:`n<pre>$errText</pre>"
                }
              }

            } catch {
              Start-Sleep -Seconds 3
            }
          }