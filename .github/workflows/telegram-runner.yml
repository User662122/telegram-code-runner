name: Telegram Runner

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram chat ID to monitor and reply to'
        required: true
        type: string
        default: '6173586090'

jobs:
  run:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Interactive Telegram session
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id }}
        run: |
          $token   = $env:TELEGRAM_BOT_TOKEN
          $chatId  = $env:CHAT_ID
          $apiBase = "https://api.telegram.org/bot$token"

          $E_OK   = [char]0x2705
          $E_WAIT = [char]0x23F3
          $E_ERR  = [char]0x274C
          $E_STOP = [char]::ConvertFromUtf32(0x1F6D1)
          $E_ARR  = [char]0x2192
          $E_ELL  = [char]0x2026

          function Send-Msg($text) {
            $b  = @{ chat_id = $chatId; text = $text; parse_mode = "HTML" } | ConvertTo-Json -Depth 3
            $by = [System.Text.Encoding]::UTF8.GetBytes($b)
            try {
              $r = (Invoke-WebRequest -Uri "$apiBase/sendMessage" -Method POST `
                      -ContentType "application/json; charset=utf-8" `
                      -Body $by -UseBasicParsing).Content | ConvertFrom-Json
              return $r.result.message_id
            } catch { return $null }
          }

          function Edit-Msg($msgId, $text) {
            $b  = @{ chat_id = $chatId; message_id = $msgId; text = $text; parse_mode = "HTML" } | ConvertTo-Json -Depth 3
            $by = [System.Text.Encoding]::UTF8.GetBytes($b)
            try {
              Invoke-WebRequest -Uri "$apiBase/editMessageText" -Method POST `
                -ContentType "application/json; charset=utf-8" `
                -Body $by -UseBasicParsing | Out-Null
            } catch {}
          }

          function Detect-Lang($code) {
            if ($code -match '(?m)^\s*(import\s+\w|from\s+\w+\s+import|def\s+\w+\s*\(|class\s+\w+[\s:(]|#!\s*/usr/bin/env\s+python)') {
              return 'python'
            }
            return 'powershell'
          }

          function Build-LiveText($lang, $lines, $final) {
            $E_OK   = [char]0x2705
            $E_WAIT = [char]0x23F3
            $E_ELL  = [char]0x2026
            $raw    = ($lines -join "`n").TrimEnd()
            $maxLen = 3500
            $tail   = if ($raw.Length -gt $maxLen) { "$E_ELL" + $raw.Substring($raw.Length - $maxLen) } else { $raw }
            $esc    = $tail -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
            if ([string]::IsNullOrWhiteSpace($esc)) {
              $esc = if ($final) { "(no output)" } else { "(running$E_ELL)" }
            }
            $icon   = if ($final) { $E_OK } else { $E_WAIT }
            $suffix = if ($final) { "" } else { " <i>(live)</i>" }
            return "$icon [$lang]$suffix`n<pre>$esc</pre>"
          }

          function Stringify-Output($item) {
            if ($item -is [System.Management.Automation.ErrorRecord]) {
              return $item.Exception.ToString()
            }
            return [string]$item
          }

          # Remove webhook so getUpdates works
          Invoke-WebRequest -Uri "$apiBase/deleteWebhook" -Method POST -UseBasicParsing | Out-Null
          Start-Sleep -Seconds 2

          # Skip already-queued messages
          $r       = Invoke-WebRequest -Uri "$apiBase/getUpdates?limit=100&offset=-1" -UseBasicParsing
          $updates = ($r.Content | ConvertFrom-Json).result
          $offset  = if ($updates.Count -gt 0) { $updates[-1].update_id + 1 } else { 0 }

          $runId = $env:GITHUB_RUN_ID
          Send-Msg ("$E_OK <b>Windows VM ready</b> (run #$runId)`n`n" +
                    "Text $E_ARR auto-detected (Python / PowerShell)`n" +
                    "<code>/cmd</code> prefix $E_ARR CMD shell`n" +
                    "<code>/stop</code> $E_ARR end session") | Out-Null

          while ($true) {
            try {
              $pollUrl = "$apiBase/getUpdates?offset=$offset&timeout=30&allowed_updates=%5B%22message%22%5D"
              $r       = Invoke-WebRequest -Uri $pollUrl -UseBasicParsing -TimeoutSec 45
              $result  = ($r.Content | ConvertFrom-Json)

              foreach ($update in $result.result) {
                $offset = $update.update_id + 1
                $msg    = $update.message
                if (-not $msg -or -not $msg.text) { continue }
                if ([string]$msg.chat.id -ne $chatId) { continue }

                $text = $msg.text.Trim()

                if ($text -eq '/stop') {
                  Send-Msg "$E_STOP Session ended." | Out-Null
                  exit 0
                }

                # Determine mode
                if ($text.StartsWith('/')) {
                  $lang    = 'CMD'
                  $content = ($text.Substring(1) -replace '@\w+','').Trim()
                } else {
                  $content = $text
                  $lang    = Detect-Lang $content
                }

                if ([string]::IsNullOrWhiteSpace($content)) {
                  Send-Msg "Please provide a command after /" | Out-Null
                  continue
                }

                $liveMsgId   = Send-Msg "$E_WAIT [$lang] starting$E_ELL"
                $outputLines = [System.Collections.Generic.List[string]]::new()
                $lastEdit    = [DateTime]::MinValue

                try {
                  switch ($lang) {

                    # ── FIX: CMD now uses file redirection, same pattern as Python ──
                    'CMD' {
                      Set-Content -Path .\run.bat -Value $content -Encoding ASCII
                      try {
                        $proc = Start-Process `
                          -FilePath "cmd.exe" `
                          -ArgumentList "/c", ".\run.bat" `
                          -RedirectStandardOutput ".\cmd_stdout.txt" `
                          -RedirectStandardError  ".\cmd_stderr.txt" `
                          -NoNewWindow -Wait -PassThru

                        if (Test-Path .\cmd_stdout.txt) {
                          Get-Content .\cmd_stdout.txt | ForEach-Object { $outputLines.Add([string]$_) }
                        }
                        if (Test-Path .\cmd_stderr.txt) {
                          $stderrRaw = Get-Content .\cmd_stderr.txt -Raw
                          if (-not [string]::IsNullOrWhiteSpace($stderrRaw)) {
                            if ($outputLines.Count -gt 0) { $outputLines.Add("") }
                            Get-Content .\cmd_stderr.txt | ForEach-Object { $outputLines.Add([string]$_) }
                          }
                        }
                        # Include exit code if non-zero so user sees it
                        if ($proc.ExitCode -ne 0) {
                          $outputLines.Add("")
                          $outputLines.Add("[Exit code: $($proc.ExitCode)]")
                        }
                      } finally {
                        Remove-Item .\cmd_stdout.txt, .\cmd_stderr.txt -ErrorAction SilentlyContinue
                        Edit-Msg $liveMsgId (Build-LiveText $lang $outputLines $true)
                      }
                    }

                    'python' {
                      Set-Content -Path .\run.py -Value $content -Encoding UTF8
                      try {
                        $proc = Start-Process `
                          -FilePath python `
                          -ArgumentList "-u", ".\run.py" `
                          -RedirectStandardOutput ".\py_stdout.txt" `
                          -RedirectStandardError  ".\py_stderr.txt" `
                          -NoNewWindow -Wait -PassThru

                        if (Test-Path .\py_stdout.txt) {
                          Get-Content .\py_stdout.txt | ForEach-Object { $outputLines.Add([string]$_) }
                        }
                        if (Test-Path .\py_stderr.txt) {
                          $stderrRaw = Get-Content .\py_stderr.txt -Raw
                          if (-not [string]::IsNullOrWhiteSpace($stderrRaw)) {
                            if ($outputLines.Count -gt 0) { $outputLines.Add("") }
                            Get-Content .\py_stderr.txt | ForEach-Object { $outputLines.Add([string]$_) }
                          }
                        }
                      } finally {
                        Remove-Item .\py_stdout.txt, .\py_stderr.txt -ErrorAction SilentlyContinue
                        Edit-Msg $liveMsgId (Build-LiveText $lang $outputLines $true)
                      }
                    }

                    default {
                      Set-Content -Path .\run.ps1 -Value $content -Encoding UTF8
                      try {
                        powershell.exe -ExecutionPolicy Bypass -File .\run.ps1 2>&1 | ForEach-Object {
                          $line = Stringify-Output $_
                          $outputLines.Add($line)
                          if (([DateTime]::Now - $lastEdit).TotalSeconds -ge 1.0) {
                            $lastEdit = [DateTime]::Now
                            Edit-Msg $liveMsgId (Build-LiveText $lang $outputLines $false)
                          }
                        }
                      } finally {
                        Edit-Msg $liveMsgId (Build-LiveText $lang $outputLines $true)
                      }
                    }

                  }

                } catch {
                  # ── FIX: $_.ToString() gives full error + script position; .Message is often empty ──
                  $errText = $_.ToString()
                  if ([string]::IsNullOrWhiteSpace($errText)) { $errText = "Unknown error (no message)" }
                  $errEsc  = $errText -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
                  Edit-Msg $liveMsgId "$E_ERR [$lang] Error:`n<pre>$errEsc</pre>"
                }
              }
            } catch {
              Start-Sleep -Seconds 3
            }
          }