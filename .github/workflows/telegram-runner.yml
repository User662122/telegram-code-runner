name: Telegram Runner Pro

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: Telegram chat ID
        required: true
        default: "6173586090"

jobs:
  run:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Start Telegram Runner
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id }}
        run: |
          $token   = $env:TELEGRAM_BOT_TOKEN
          $chatId  = $env:CHAT_ID
          $apiBase = "https://api.telegram.org/bot$token"

          $OK="OK"; $ERR="ERR"; $WAIT="WAIT"

          function Send-Msg($text) {
            $body = @{ chat_id=$chatId; text=$text } | ConvertTo-Json
            Invoke-RestMethod "$apiBase/sendMessage" -Method POST -Body $body -ContentType "application/json" | Out-Null
          }

          function Send-File($filePath) {
            if (!(Test-Path $filePath)) {
              Send-Msg "File not found: $filePath"
              return
            }
            curl.exe -F "chat_id=$chatId" -F "document=@$filePath" "$apiBase/sendDocument" | Out-Null
          }

          function Download-TelegramFile($fileId, $fileName) {
            try {
              $fileInfo = Invoke-RestMethod "$apiBase/getFile?file_id=$fileId"
              $filePath = $fileInfo.result.file_path
              $url = "https://api.telegram.org/file/bot$token/$filePath"
              Invoke-WebRequest $url -OutFile $fileName
              return $fileName
            } catch { return $null }
          }

          Invoke-RestMethod "$apiBase/deleteWebhook" -Method POST | Out-Null
          $offset = 0

          Send-Msg "Runner Started"

          while ($true) {
            try {
              $updates = Invoke-RestMethod "$apiBase/getUpdates?offset=$offset&timeout=30"

              foreach ($u in $updates.result) {
                $offset = $u.update_id + 1
                $msg = $u.message
                if (-not $msg) { continue }
                if ($msg.chat.id -ne [int64]$chatId) { continue }

                if ($msg.document) {
                  $fileId = $msg.document.file_id
                  $name   = $msg.document.file_name

                  Send-Msg "Downloading $name..."
                  $saved = Download-TelegramFile $fileId $name

                  if ($saved) {
                    Send-Msg "Saved: $saved"
                  } else {
                    Send-Msg "Download failed"
                  }
                  continue
                }

                if (-not $msg.text) { continue }
                $text = $msg.text.Trim()

                if ($text -eq "/ls") {
                  $files = Get-ChildItem | Select Name
                  $out = $files | ForEach-Object { $_.Name }
                  Send-Msg ($out -join "`n")
                  continue
                }

                if ($text.StartsWith("/get ")) {
                  $file = $text.Substring(5).Trim()
                  Send-File $file
                  continue
                }

                try {
                  $output = cmd /c $text 2>&1
                  $outFile = "result.txt"
                  $output | Out-File $outFile
                  Send-File $outFile
                } catch {
                  Send-Msg "Error"
                }
              }
            } catch {
              Start-Sleep -Seconds 2
            }
          }