name: Telegram Runner

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: Authorized Telegram chat ID (Recommended for security)
        required: false

jobs:
  run:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests mss numpy opencv-python-headless flask

      - name: Start Runner
        shell: cmd
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_CHAT_ID: ${{ inputs.chat_id }}
        run: |
          python .github/runner.py
